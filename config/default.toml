# Wakey Configuration
# Your laptop, alive.

[general]
data_dir = "~/.wakey"
log_level = "info"

[heartbeat]
tick_interval_ms = 2000       # 2 seconds — system vitals, active window
breath_interval_ms = 30000    # 30 seconds — screen understanding
reflect_interval_ms = 900000  # 15 minutes — activity summary
dream_hour = 4                # 4 AM — daily memory compression

[vision]
a11y_enabled = true           # Layer 0: OS accessibility APIs (always-on)
ocr_enabled = true            # Layer 1: local OCR on screen change
vlm_enabled = true            # Layer 2: cloud vision LLM (periodic)
vlm_interval_secs = 60        # How often to send screenshots to VLM
capture_resolution = [1024, 768]

[memory]
backend = "viking"
viking_root = "~/.wakey/viking"
max_working_memory_tokens = 4096

[action]
enabled = true
require_confirmation = true   # Ask before acting (safe default)
policy_dir = "~/.wakey/policies"

[persona]
name = "Buddy"                # User names their own companion
style = "casual"              # casual, formal, playful, minimal
proactive = true              # Should Wakey initiate conversations?

[voice]
enabled = true                # Enable voice mode
provider = "deepgram"         # Voice provider: deepgram
api_key_env = "DEEPGRAM_API_KEY"  # Environment variable for API key
stt_model = "nova-3"          # Deepgram STT model
tts_model = "aura-2-theia-en" # Deepgram TTS model
asr_sample_rate = 16000       # 16kHz for ASR
tts_sample_rate = 24000       # 24kHz for TTS
language = "en"               # ASR language: en, zh, etc.
push_to_talk_key = "space"    # Key to hold for voice input
endpointing_ms = 300          # Speech end detection timeout (ms)

[llm]
default_provider = "groq"

# Groq — GPT-OSS 20B, 918 tokens/sec, ~0.6s first token
[[llm.providers]]
name = "groq"
api_base = "https://api.groq.com/openai/v1"
model = "openai/gpt-oss-20b"
api_key_env = "GROQ_API_KEY"

# OpenRouter free (fallback)
[[llm.providers]]
name = "openrouter"
api_base = "https://openrouter.ai/api/v1"
model = "openrouter/free"
api_key_env = "OPENROUTER_API_KEY"

# Local Ollama (offline fallback)
[[llm.providers]]
name = "ollama"
api_base = "http://localhost:11434/v1"
model = "llama3.2"
api_key_env = ""
