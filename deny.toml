# cargo-deny configuration
# Run: cargo deny check

[advisories]
vulnerability = "deny"
unmaintained = "warn"

[licenses]
allow = ["MIT", "Apache-2.0", "BSD-2-Clause", "BSD-3-Clause", "ISC", "Zlib", "Unicode-3.0"]
unlicensed = "deny"

[bans]
multiple-versions = "warn"
deny = [
    # No C OpenSSL — use rustls
    { name = "openssl" },
    { name = "openssl-sys" },
    # No heavy web frameworks — this is a desktop app
    { name = "axum" },
    { name = "actix-web" },
    { name = "rocket" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
